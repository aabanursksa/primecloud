name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Assemble deploy package
        run: |
          mkdir -p deploy-temp
          mkdir -p deploy-temp/api
          mkdir -p deploy-temp/public/dashboard
          mkdir -p deploy-temp/public/pos

          # Copy API build
          cp -r apps/api/dist/* deploy-temp/api/
          cp apps/api/package.json deploy-temp/api/ 2>/dev/null || true

          # Copy Dashboard static export
          if [ -d "apps/dashboard/out" ]; then
            cp -r apps/dashboard/out/* deploy-temp/public/dashboard/
          fi

          # Copy POS build
          cp -r apps/pos/dist/* deploy-temp/public/pos/ 2>/dev/null || true

          # Copy deploy server and config
          cp deploy/package.json deploy-temp/
          cp deploy/server.js deploy-temp/
          cp deploy/start.sh deploy-temp/
          chmod +x deploy-temp/start.sh

          # Install production deps
          cd deploy-temp
          npm install --production --ignore-scripts
          cd ..

      - name: Deploy via FTP to Hostinger (if secrets configured)
        if: ${{ secrets.HOSTINGER_FTP_HOST != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASS }}
          local-dir: deploy-temp/
          server-dir: ${{ secrets.HOSTINGER_DEPLOY_PATH || '/' }}

      - name: Push build artifacts to deployment branch
        run: |
          git config user.name "Prime Cloud Bot"
          git config user.email "bot@primecloud.sa"
          git checkout --orphan deploy-temp-branch
          rm -rf .github apps packages infrastructure deploy
          cp -r deploy-temp/* .
          git add -A
          git commit -m "Production build $(date +'%Y-%m-%d %H:%M')"
          git push origin deploy-temp-branch:deployment --force
          git checkout main
