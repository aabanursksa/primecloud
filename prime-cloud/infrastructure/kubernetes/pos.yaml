apiVersion: apps/v1
kind: Deployment
metadata:
  name: prime-pos
  namespace: prime-cloud
  labels:
    app: prime-pos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prime-pos
  template:
    metadata:
      labels:
        app: prime-pos
    spec:
      containers:
        - name: pos
          image: primecloud/pos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: prime-pos
  namespace: prime-cloud
spec:
  selector:
    app: prime-pos
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
